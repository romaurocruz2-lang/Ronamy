<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Agendamento Profissional</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 500px;
      margin: 40px auto;
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h1 {
      text-align: center;
      margin-bottom: 20px;
    }

    input, select, button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    button {
      background: #2d6cdf;
      color: white;
      border: none;
      cursor: pointer;
      margin-top: 15px;
    }

    button:hover {
      background: #1b4fb3;
    }

    label {
      font-size: 13px;
      margin-top: 10px;
      display: block;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Agendar Horário</h1>

  <form method="POST">

    <label>Nome</label>
    <input type="text" name="nome" required>

    <label>WhatsApp</label>
    <input type="text" name="whatsapp" required>

    <label>Profissional</label>
    <select name="profissional" required>
      {% for p in professionals %}
        <option value="{{ p[0] }}">{{ p[0] }}</option>
      {% endfor %}
    </select>

    <label>Serviço</label>
    <select name="servico" required>
      {% for s in services %}
        <option value="{{ s[0] }}">{{ s[0] }}</option>
      {% endfor %}
    </select>

    <label>Data</label>
    <input type="date" name="data" required>

    <label>Horário</label>
    <select name="hora" required>
      {% for h in horarios %}
        <option value="{{ h }}">{{ h }}</option>
      {% endfor %}
    </select>

    <button type="submit">Confirmar Agendamento</button>

  </form>
</div>

</body>
</html>
