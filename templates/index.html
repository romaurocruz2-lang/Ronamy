<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ronamy - Agendamento</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    .hero {
      padding: 60px 20px;
      text-align: center;
      background: linear-gradient(135deg, #111, #222);
    }

    .hero h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #ccc;
      max-width: 600px;
      margin: auto;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: #1c1c1c;
      padding: 20px;
      border-radius: 12px;
      margin-top: 20px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: none;
    }

    button {
      background: gold;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #d4af37;
    }

    .info {
      text-align: center;
      margin-top: 10px;
      color: #aaa;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>Ronamy</h1>
  <p>Experiência Premium • Elegância & cuidado para você</p>
</div>

<div class="container">

  <div class="card">
    <h2>Agendar Horário</h2>

    <form method="POST">

      <label>Nome Completo</label>
      <input type="text" name="nome" required>

      <label>WhatsApp</label>
      <input type="text" name="whatsapp" required>

      <label>Serviço</label>
      <select name="servico">
        {% for s in services %}
        <option value="{{ s }}">{{ s }}</option>
        {% endfor %}
      </select>

      <label>Profissional</label>
      <select name="profissional">
        {% for p in professionals %}
        <option value="{{ p }}">{{ p }}</option>
        {% endfor %}
      </select>

      <label>Data</label>
      <input type="date" name="data" required>

      <label>Horário</label>
      <select name="hora">
        {% for h in horarios %}
        <option value="{{ h }}">{{ h }}</option>
        {% endfor %}
      </select>

      <button type="submit">Confirmar Reserva</button>
    </form>

    <div class="info">
      Rua das Acácias, 123 • Ter a Sáb 09h–20h
    </div>

  </div>
</div>

</body>
</html>
