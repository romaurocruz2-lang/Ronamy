<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Painel Ronamy</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="sidebar">
  <h2>RONAMY</h2>

  <a href="/painel">📊 Dashboard</a>
  <a href="/">📅 Agendamento</a>
  <a href="/logout">🚪 Sair</a>
</div>

<div class="main">

  <h1>Dashboard</h1>

  <div class="cards">
    <div class="card">
      <h3>Total de Agendamentos</h3>
      <p>{{ agendamentos|length }}</p>
    </div>
  </div>

  <div class="card">
    <h3>Novo Agendamento</h3>

    <form method="POST" action="/agendar">

      <input type="text" name="nome" placeholder="Nome" required>

      <input type="date" name="data" required>

      <input type="time" name="hora" required>

      <select name="profissional" required>
        <option value="">Profissional</option>
        {% for p in profissionais %}
          <option value="{{ p[0] }}">{{ p[0] }}</option>
        {% endfor %}
      </select>

      <select name="servico" required>
        <option value="">Serviço</option>
        {% for s in servicos %}
          <option value="{{ s[0] }}">{{ s[0] }} - R$ {{ s[1] }}</option>
        {% endfor %}
      </select>

      <button type="submit">Agendar</button>

    </form>
  </div>

  <div class="card">
    <h3>Lista de Agendamentos</h3>

    <table>
      <tr>
        <th>Nome</th>
        <th>Data</th>
        <th>Hora</th>
        <th>Profissional</th>
        <th>Serviço</th>
      </tr>

      {% for a in agendamentos %}
      <tr>
        <td>{{ a[1] }}</td>
        <td>{{ a[2] }}</td>
        <td>{{ a[3] }}</td>
        <td>{{ a[4] }}</td>
        <td>{{ a[5] }}</td>
      </tr>
      {% endfor %}

    </table>

  </div>

</div>

</body>
</html>
